<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5161d6"/>
      <stop offset="1" stop-color="#2c3aa0"/>
    </linearGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#9fd0ff" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Vol vierkant, edge-to-edge: GEEN ronde hoeken. Het OS maskt zelf. -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Inhoud binnen de maskable safe-zone (cirkel ~r205 om het midden) -->
  <!-- radar-ringen -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="6">
    <circle cx="256" cy="256" r="52"/>
    <circle cx="256" cy="256" r="104"/>
    <circle cx="256" cy="256" r="156"/>
  </g>

  <!-- radar-sweep -->
  <path d="M256 256 L256 100 A156 156 0 0 1 388 178 Z" fill="url(#sweep)"/>

  <!-- centrale locatie-pin (compacter, blijft binnen safe-zone) -->
  <g>
    <path d="M256 168
             c-46 0 -84 38 -84 84
             c0 60 84 144 84 144
             c0 0 84 -84 84 -144
             c0 -46 -38 -84 -84 -84 Z"
          fill="#ffffff"/>
    <circle cx="256" cy="252" r="34" fill="#3142a8"/>
  </g>
</svg>
