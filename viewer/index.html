<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-title" content="Baken">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3f51b5">
  <title>Baken</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <!-- Bovenkaart: alleen zichtbaar bij precies één gevolgde persoon -->
  <div id="topcard" class="card hidden">
    <div class="row1">
      <span class="dot" id="status-dot"></span>
      <span class="name" id="t-name">—</span>
    </div>
    <div class="addr" id="t-addr"></div>
    <div class="row2">
      <span class="meta" id="t-move"></span>
      <span class="meta" id="t-dist"></span>
      <span class="meta" id="t-batt"></span>
    </div>
    <div class="seen" id="t-seen"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="fabs">
    <button class="fab" id="fab-locate" title="Centreer en volg" aria-label="locate">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"></circle>
        <line x1="12" y1="1.5" x2="12" y2="4.5"></line><line x1="12" y1="19.5" x2="12" y2="22.5"></line>
        <line x1="1.5" y1="12" x2="4.5" y2="12"></line><line x1="19.5" y1="12" x2="22.5" y2="12"></line>
      </svg>
    </button>
    <button class="fab" id="fab-settings" title="Instellingen" aria-label="settings">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
      </svg>
    </button>
  </div>

  <!-- instellingen -->
  <div id="sheet-backdrop" class="hidden"></div>
  <div id="sheet" class="sheet hidden">
    <div class="sheet-handle"></div>
    <h2 data-i18n="settings">Instellingen</h2>

    <section id="sec-who" class="hidden">
      <h3 data-i18n="who">Wie tonen</h3>
      <ul id="who-list" class="checks"></ul>
    </section>

    <section>
      <h3 data-i18n="theme">Thema</h3>
      <div class="seg" id="seg-theme">
        <button data-v="system" data-i18n="system">Systeem</button>
        <button data-v="light" data-i18n="light">Licht</button>
        <button data-v="dark" data-i18n="dark">Donker</button>
      </div>
    </section>

    <section>
      <h3 data-i18n="map">Kaart</h3>
      <div class="seg" id="seg-map">
        <button data-v="standard" data-i18n="map_standard">Standaard</button>
        <button data-v="voyager">Voyager</button>
        <button data-v="roads" data-i18n="map_roads">Wegen</button>
        <button data-v="imap">iMap</button>
      </div>
    </section>

    <section>
      <h3 data-i18n="language">Taal</h3>
      <div class="seg" id="seg-lang">
        <button data-v="system" data-i18n="system">Systeem</button>
        <button data-v="nl">Nederlands</button>
        <button data-v="en">English</button>
      </div>
    </section>

    <section>
      <h3 data-i18n="notifs">Meldingen</h3>
      <ul id="notif-list" class="notiflist"></ul>
    </section>

    <div class="version" id="ver"></div>
  </div>

  <!-- login -->
  <div id="login" class="hidden">
    <form id="login-form">
      <h1 id="brand">Baken</h1>
      <p data-i18n="login_sub">Log in om de kaart te zien</p>
      <input id="u" type="text" autocomplete="username" autocapitalize="none" autocorrect="off">
      <input id="p" type="password" autocomplete="current-password">
      <button type="submit" data-i18n="login">Inloggen</button>
      <div class="err" id="login-err"></div>
    </form>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="vendor/maplibre/maplibre-gl.js"></script>
  <script src="vendor/maplibre/leaflet-maplibre-gl.js"></script>
  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
